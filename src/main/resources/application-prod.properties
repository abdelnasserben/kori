server.port=${KORI_SERVER_PORT:8081}

# ----------------------------------------
# PostgreSQL datasource (production via env)
# ----------------------------------------
spring.datasource.url=${KORI_DB_URL}
spring.datasource.username=${KORI_DB_USERNAME}
spring.datasource.password=${KORI_DB_PASSWORD}

# ===============================
# Security (production via env)
# ===============================
kori.security.jwt.issuer-uri=${KORI_JWT_ISSUER_URI}
